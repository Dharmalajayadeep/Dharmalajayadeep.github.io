<body class="h-full bg-slate-50 text-slate-900">
  <div id="app" class="flex flex-col min-h-screen">
    <!-- Navigation Header -->
    <header id="header" class="w-full sticky top-0 z-50 backdrop-blur-md bg-white/80 border-b border-slate-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center py-4">
          <div class="flex flex-col cursor-pointer" onclick="navigateToPage('home')">
            <span id="brandName" class="text-2xl sm:text-3xl font-bold heading-font tracking-wide text-blue-900">We Fill It</span>
            <span id="tagline" class="text-xs sm:text-sm opacity-75 font-light tracking-wide">Global Consultancy Services</span>
          </div>
          
          <nav class="hidden lg:flex items-center space-x-8">
            <button onclick="navigateToPage('home')" class="nav-link text-sm uppercase tracking-wider hover:text-blue-600">Home</button>
            <button onclick="navigateToPage('overseas-education')" class="nav-link text-sm uppercase tracking-wider hover:text-blue-600">Education</button>
            <button onclick="navigateToPage('visa-services')" class="nav-link text-sm uppercase tracking-wider hover:text-blue-600">Visa</button>
            <button onclick="navigateToPage('global-holidays')" class="nav-link text-sm uppercase tracking-wider hover:text-blue-600">Holidays</button>
            <button onclick="navigateToPage('hr-solutions')" class="nav-link text-sm uppercase tracking-wider hover:text-blue-600">HR Solutions</button>
            <button onclick="navigateToPage('contact')" class="px-5 py-2 bg-blue-600 text-white rounded-full text-sm font-bold hover:bg-blue-700 transition-colors">Contact Us</button>
          </nav>

          <!-- Mobile Menu Toggle -->
          <button class="lg:hidden p-2" onclick="toggleMobileMenu()">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
          </button>
        </div>
      </div>
      
      <!-- Mobile Menu -->
      <div id="mobileMenu" class="mobile-menu lg:hidden bg-white border-b overflow-hidden">
        <div class="px-4 pt-2 pb-6 space-y-2">
          <button onclick="navigateToPage('home')" class="block w-full text-left py-2 text-slate-700">Home</button>
          <button onclick="navigateToPage('overseas-education')" class="block w-full text-left py-2 text-slate-700">Education</button>
          <button onclick="navigateToPage('visa-services')" class="block w-full text-left py-2 text-slate-700">Visa Services</button>
          <button onclick="navigateToPage('global-holidays')" class="block w-full text-left py-2 text-slate-700">Global Holidays</button>
          <button onclick="navigateToPage('hr-solutions')" class="block w-full text-left py-2 text-slate-700">HR Solutions</button>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="content" class="flex-grow">
      <!-- Content injected by JS -->
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-white py-12">
      <div class="max-w-7xl mx-auto px-4 text-center">
        <h2 class="text-2xl font-bold mb-4">We Fill It</h2>
        <p class="opacity-60 mb-8 max-w-md mx-auto">Bridging dreams with global opportunities through excellence in education, migration, and career solutions.</p>
        <div class="flex justify-center space-x-6 mb-8">
          <span class="cursor-pointer hover:text-blue-400">LinkedIn</span>
          <span class="cursor-pointer hover:text-blue-400">Instagram</span>
          <span class="cursor-pointer hover:text-blue-400">Twitter</span>
        </div>
        <div class="pt-8 border-t border-slate-800 text-sm opacity-50">
          © 2024 We Fill It Global Consultancy. All rights reserved.
        </div>
      </div>
    </footer>
  </div>

  <script>
    const pages = {
      home: `
        <div class="page-transition py-20 px-4 text-center">
          <div class="max-w-4xl mx-auto">
            <span class="inline-block px-4 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-bold mb-6">GLOBAL EXCELLENCE</span>
            <h1 class="text-5xl md:text-7xl font-extrabold mb-8 heading-font leading-tight text-slate-900">Your Future Starts <span class="text-blue-600">Without Borders</span></h1>
            <p class="text-xl text-slate-600 mb-10 leading-relaxed">Providing comprehensive solutions for overseas education, immigration, and international career placement with 15+ years of expertise.</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-16">
              <div class="card-premium p-8 bg-white rounded-2xl shadow-xl shadow-slate-200/50">
                <div class="text-3xl mb-4">🎓</div>
                <h3 class="text-xl font-bold mb-2">Education</h3>
                <p class="text-slate-500 text-sm">Study at world-class universities in UK, USA, Canada, and Australia.</p>
              </div>
              <div class="card-premium p-8 bg-white rounded-2xl shadow-xl shadow-slate-200/50 border-t-4 border-blue-600">
                <div class="text-3xl mb-4">🛂</div>
                <h3 class="text-xl font-bold mb-2">Visa Experts</h3>
                <p class="text-slate-500 text-sm">99% success rate in study, work, and tourist visa processing.</p>
              </div>
              <div class="card-premium p-8 bg-white rounded-2xl shadow-xl shadow-slate-200/50">
                <div class="text-3xl mb-4">💼</div>
                <h3 class="text-xl font-bold mb-2">HR Solutions</h3>
                <p class="text-slate-500 text-sm">Connecting top global talent with industry-leading organizations.</p>
              </div>
            </div>
          </div>
        </div>
      `,
      'overseas-education': `
        <div class="page-transition py-16 px-4 max-w-7xl mx-auto">
          <h2 class="text-4xl font-bold mb-12">Global Education Services</h2>
          <div class="grid md:grid-cols-2 gap-12">
            <div class="bg-blue-600 rounded-3xl p-10 text-white">
              <h3 class="text-2xl font-bold mb-4">University Admissions</h3>
              <p class="opacity-90">Personalized guidance for picking the right course and country based on your profile.</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div class="p-6 bg-white border rounded-xl">USA</div>
              <div class="p-6 bg-white border rounded-xl">United Kingdom</div>
              <div class="p-6 bg-white border rounded-xl">Canada</div>
              <div class="p-6 bg-white border rounded-xl">Australia</div>
            </div>
          </div>
        </div>
      `,
      contact: `
        <div class="page-transition py-16 px-4 max-w-3xl mx-auto">
          <div class="bg-white p-10 rounded-3xl shadow-2xl">
            <h2 class="text-3xl font-bold mb-8">Get In Touch</h2>
            <div class="space-y-4">
              <input type="text" placeholder="Full Name" class="w-full p-4 bg-slate-50 border rounded-lg outline-none focus:border-blue-500">
              <input type="email" placeholder="Email Address" class="w-full p-4 bg-slate-50 border rounded-lg outline-none focus:border-blue-500">
              <textarea placeholder="Message" rows="4" class="w-full p-4 bg-slate-50 border rounded-lg outline-none focus:border-blue-500"></textarea>
              <button class="w-full py-4 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">Send Message</button>
            </div>
          </div>
        </div>
      `
    };

    function navigateToPage(page) {
      const content = pages[page] || pages.home;
      document.getElementById('content').innerHTML = content;
      document.getElementById('mobileMenu').classList.remove('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('active');
    }

    // Initialize with home page
    document.addEventListener('DOMContentLoaded', () => navigateToPage('home'));
  </script>
</body>
</html>
